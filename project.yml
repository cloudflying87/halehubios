name: HaleHubIOS
options:
  bundleIdPrefix: com.halefamily
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: 6.0
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "21"

targets:
  HaleHubIOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/HaleHubIOS
    dependencies:
      - sdk: LocalAuthentication.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.halefamily.halehubios
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Sources/HaleHubIOS/Info.plist
      properties:
        CFBundleName: HaleHub
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        UIRequiresFullScreen: true
        ITSAppUsesNonExemptEncryption: false
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - halehub
            CFBundleURLName: com.halefamily.halehubios
        NSCameraUsageDescription: "Used to take photos of tote contents for easy identification."
        NSPhotoLibraryUsageDescription: "Used to attach photos to totes from your photo library."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
