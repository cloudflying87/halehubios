name: HaleHubIOS
options:
  bundleIdPrefix: com.halefamily
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: 6.0
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "50"
    # Signing lives here (not just in the .xcodeproj) so it survives
    # `xcodegen generate`. Both targets inherit it.
    DEVELOPMENT_TEAM: "473M622LJJ"
    CODE_SIGN_STYLE: Automatic

targets:
  HaleHubIOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/HaleHubIOS
    dependencies:
      - sdk: LocalAuthentication.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.halefamily.halehubios
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Sources/HaleHubIOS/Info.plist
      properties:
        CFBundleName: HaleHub
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        UIRequiresFullScreen: true
        ITSAppUsesNonExemptEncryption: false
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - halehub
            CFBundleURLName: com.halefamily.halehubios
        NSCameraUsageDescription: "Used to take photos of tote contents and scan product barcodes into your pantry."
        NSFaceIDUsageDescription: "Used to unlock and protect your financial data."
        NSPhotoLibraryUsageDescription: "Used to attach photos to totes from your photo library."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
