name: HaleHubIOS
options:
  bundleIdPrefix: com.halefamily
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: 6.0
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "66"
    # Signing lives here (not just in the .xcodeproj) so it survives
    # `xcodegen generate`. Both targets inherit it.
    DEVELOPMENT_TEAM: "473M622LJJ"
    CODE_SIGN_STYLE: Automatic

targets:
  HaleHubIOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/HaleHubIOS
    dependencies:
      - sdk: LocalAuthentication.framework
      - sdk: VisionKit.framework
      # Safari "Share → HaleHub" recipe import. Embedding it here is what keeps
      # the extension in every `xcodegen generate` — see docs/SHARE_EXTENSION.md.
      - target: ShareExtension
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.halefamily.halehubios
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # App Group (shared login token) — file exists on disk but must be
        # referenced here or `xcodegen generate` drops the entitlement.
        CODE_SIGN_ENTITLEMENTS: Sources/HaleHubIOS/HaleHubIOS.entitlements
    info:
      path: Sources/HaleHubIOS/Info.plist
      properties:
        CFBundleName: HaleHub
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        UIRequiresFullScreen: true
        ITSAppUsesNonExemptEncryption: false
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - halehub
            CFBundleURLName: com.halefamily.halehubios
        NSCameraUsageDescription: "Used to take photos of tote contents and to scan product barcodes and labels into your pantry."
        NSFaceIDUsageDescription: "Used to unlock and protect your financial data."
        NSPhotoLibraryUsageDescription: "Used to attach photos to totes from your photo library."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false

  # Safari Share Extension — "Share → HaleHub" imports a recipe from the live
  # Safari tab (GetPageContent.js captures the rendered DOM). Defined here so it
  # is part of every generated project and never dropped again.
  # See docs/SHARE_EXTENSION.md.
  ShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ShareExtension
        excludes:
          - "SETUP.md"
          - "Info.plist"
          - "ShareExtension.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.halefamily.halehubios.ShareExtension
        INFOPLIST_FILE: ShareExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: ShareExtension/ShareExtension.entitlements
        # MARKETING_VERSION / CURRENT_PROJECT_VERSION are inherited from the
        # project-level settings.base, so the extension version always matches
        # the app (its Info.plist reads $(MARKETING_VERSION)/$(CURRENT_PROJECT_VERSION)).

# Shared scheme lives here so `xcodegen generate` recreates it every time —
# a manually-shared scheme gets wiped on regen (same trap as the extension).
schemes:
  HaleHubIOS:
    build:
      targets:
        HaleHubIOS: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
